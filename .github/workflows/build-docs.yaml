name: Build Docs
on:
  workflow_call:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
      publish-docs:
        description: 'whether to deploy the generated docs to github pages'
        required: false
        default: false
        type: boolean
permissions:
  contents: read
jobs:
  generate-docs:
    runs-on: "ubuntu-24.04"
    name: "generate-docs"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: ./.github/actions/setup-environment
        id: runner-context
        with:
          install-uv: true
          install-devtools: true
      - name: mkdocs-build
        env:
          PACKAGE_VERSION: "${{ steps.runner-context.outputs.package-version }}"
        run: |
          cd rats-devtools
          uv version "$PACKAGE_VERSION"
          rats-ci install
          rats-docs build
      - name: "upload-gh-pages"
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "rats-devtools/dist/site"
  deploy-docs:
    name: "deploy-docs"
    if: "${{ inputs.publish-docs }}"
    needs: generate-docs
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: "deploy-gh-pages"
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
