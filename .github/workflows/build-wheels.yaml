name: Build Wheels
on:
  workflow_call:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  build-components:
    runs-on: "ubuntu-24.04"
    strategy:
      fail-fast: false
      matrix:
        component:
          - rats
          - rats-apps
          - rats-devtools
    name: "build-wheels: ${{ matrix.component }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: ./.github/actions/setup-environment
        id: runner-context
        with:
          install-uv: true
          install-devtools: true
      - name: build-wheel
        env:
          PACKAGE_VERSION: "${{ steps.runner-context.outputs.package-version }}"
        run: |
          cd ${{ matrix.component }}
          uv version "$PACKAGE_VERSION"
          rats-ci install
          uv build
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "${{ matrix.component }}/dist/*"
      - name: "upload-artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "wheels.${{ matrix.component }}"
          path: "${{ matrix.component }}/dist/*.whl"
