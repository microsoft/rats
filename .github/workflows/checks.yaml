name: Check
on:
  workflow_call:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        description: 'token used to upload coverage reports to codecov'
        required: false
permissions:
  contents: read
jobs:
  check-components:
    strategy:
      fail-fast: false
      matrix:
        component:
          - rats-devtools
          - rats-apps
    runs-on: "ubuntu-24.04"
    name: "check: ${{ matrix.component }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: ./.github/actions/setup-environment
        id: runner-context
        with:
          install-uv: true
          install-devtools: true
      - name: check
        env:
          PACKAGE_VERSION: "${{ steps.runner-context.outputs.package-version }}"
        run: |
          cd ${{ matrix.component }}
          uv version "$PACKAGE_VERSION"
          rats-ci install check test
      - name: upload-coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: microsoft/rats
          name: ${{ matrix.component }}
          verbose: true
