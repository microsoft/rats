name: Weekly
on:
  schedule:
    # Every monday at midnight
    - cron: "0 0 * * 1"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  ci-workflow:
    # ci.yaml is currently missing from this repo; its secret interface is
    # unknown, so secrets are inherited until the workflow is restored.
    uses: ./.github/workflows/ci.yaml # zizmor: ignore[secrets-inherit]
    permissions:
      contents: read
      id-token: write
      attestations: write
      security-events: write
      actions: read
    secrets: inherit
    with:
      publish-wheels: false
      publish-docs: false
      sha: main
  codeql-workflow:
    uses: ./.github/workflows/codeql.yaml
    permissions:
      security-events: write
      actions: read
      contents: read
    with:
      sha: main
